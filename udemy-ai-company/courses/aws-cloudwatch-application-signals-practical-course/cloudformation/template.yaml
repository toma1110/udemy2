AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch Application Signals hands-on sample app with low-frequency Lambda traffic.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Project
        Parameters:
          - ProjectName
      - Label:
          default: Traffic
        Parameters:
          - TrafficEnabled
          - TrafficScheduleExpression
          - Scenario
          - RequestCountPerRun
          - SlowDelayMs
          - ErrorRatePercent
      - Label:
          default: Application Signals SLO
        Parameters:
          - CreateApplicationSignalsSlo
          - AvailabilitySloTarget

Parameters:
  ProjectName:
    Type: String
    Default: appsignals-demo
    Description: Prefix for sample resources.
    AllowedPattern: '^[a-z][a-z0-9-]{2,30}[a-z0-9]$'
    ConstraintDescription: Use 4-32 lowercase letters, numbers, and hyphens. Start with a letter.
  TrafficEnabled:
    Type: String
    Default: 'true'
    Description: Enable the EventBridge Scheduler traffic generator.
    AllowedValues:
      - 'true'
      - 'false'
  TrafficScheduleExpression:
    Type: String
    Default: rate(1 minute)
    Description: EventBridge Scheduler expression. Keep this low frequency for the hands-on.
  Scenario:
    Type: String
    Default: normal
    Description: Sample API behavior used by the traffic generator.
    AllowedValues:
      - normal
      - slow
      - error
      - recovery
  RequestCountPerRun:
    Type: Number
    Default: 1
    Description: Requests sent by each scheduled traffic run.
    MinValue: 1
    MaxValue: 5
  SlowDelayMs:
    Type: Number
    Default: 1200
    Description: Delay in milliseconds for the slow scenario.
    MinValue: 100
    MaxValue: 5000
  ErrorRatePercent:
    Type: Number
    Default: 100
    Description: Percentage of requests that fail in the error scenario. Keep 100 for deterministic hands-on demos.
    MinValue: 0
    MaxValue: 100
  CreateApplicationSignalsSlo:
    Type: String
    Default: 'false'
    Description: Create the Application Signals SLO after the service has reported metrics.
    AllowedValues:
      - 'true'
      - 'false'
  AvailabilitySloTarget:
    Type: Number
    Default: 95
    Description: Request-based availability SLO target percentage.
    MinValue: 90
    MaxValue: 99.9

